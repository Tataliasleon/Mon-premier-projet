<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3 PRO | La Bourse des Startups</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hidden { display: none; }
        body { background: #050810; color: white; }
    </style>
</head>
<body class="pb-24">
    <nav class="p-4 bg-[#0f172a] border-b border-yellow-500/20 flex justify-between items-center sticky top-0 z-50">
        <div class="font-black italic text-xl">M3 <span class="text-yellow-500">BET</span></div>
        <div id="nav-balance" class="text-yellow-500 font-bold text-sm">0 $</div>
    </nav>

    <section id="page-welcome" class="p-6 text-center mt-10">
        <h1 class="text-3xl font-black uppercase italic italic">Investissez sur <span class="text-yellow-500">Lubumbashi</span></h1>
        <p class="text-slate-400 mt-4 text-sm px-4">Misez sur la croissance des meilleures startups congolaises.</p>
        <div class="mt-10 flex flex-col gap-4">
            <button onclick="showPage('home')" class="bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase shadow-lg">Voir les Paris Live</button>
            <button onclick="showPage('join')" class="bg-slate-900 border border-slate-800 py-4 rounded-2xl font-bold">Créer mon compte</button>
        </div>
    </section>

    <section id="page-home" class="page-content hidden p-4">
        <div id="bet-list" class="space-y-4"></div>
    </section>

    <section id="page-join" class="page-content hidden p-6 text-center">
        <div class="bg-[#161e2f] p-8 rounded-3xl border border-yellow-500/20">
            <h2 class="text-xl font-black text-yellow-500 mb-6 uppercase">Rejoindre M3 Pro</h2>
            <input type="text" id="reg-name" placeholder="Votre Pseudo" class="w-full bg-[#050810] p-4 rounded-xl border border-slate-800 mb-4 text-white outline-none focus:border-yellow-500">
            <button onclick="register()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase">Ouvrir mon compte</button>
        </div>
    </section>

    <script>
        let me = null;
        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('page-'+id).classList.remove('hidden');
            if(id === 'home') loadBets();
        }

        async function register() {
            const name = document.getElementById('reg-name').value;
            const res = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:name}) });
            me = await res.json();
            document.getElementById('nav-balance').innerText = me.balance + " $";
            showPage('home');
        }

        async function loadBets() {
            const res = await fetch('/api/startups');
            const data = await res.json();
            const cont = document.getElementById('bet-list');
            cont.innerHTML = data.map(s => `
                <div class="bg-[#161e2f] p-5 rounded-2xl border border-slate-800 flex justify-between items-center shadow-lg">
                    <div><p class="font-black uppercase text-sm">${s.name}</p><p class="text-[9px] text-yellow-500 font-bold uppercase">${s.sector}</p></div>
                    <button class="bg-yellow-500 text-black px-6 py-3 rounded-xl font-black italic text-xs">1.95</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
