<section id="page-auth" class="page-content hidden px-6 py-10">
    <div class="bg-[#161e2f] p-8 rounded-3xl border border-yellow-500/20 shadow-2xl text-center">
        <h2 class="text-2xl font-black mb-6 text-yellow-500 uppercase italic">Join M3 Pro</h2>
        <form class="space-y-4" onsubmit="handleRegister(event)">
            <input type="text" id="reg-username" placeholder="Pseudo" class="w-full bg-[#050810] p-4 rounded-xl border border-slate-800 outline-none focus:border-yellow-500 text-white" required>
            <input type="password" placeholder="Mot de passe" class="w-full bg-[#050810] p-4 rounded-xl border border-slate-800 outline-none focus:border-yellow-500 text-white">
            <button type="submit" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase tracking-widest text-sm">Créer mon compte</button>
        </form>
    </div>
</section>

<script>
    // Variable pour stocker l'utilisateur connecté pendant la session
    let currentUser = { username: "Invité", balance: 0 };

    async function handleRegister(event) {
        event.preventDefault();
        const username = document.getElementById('reg-username').value;

        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username })
            });

            if (response.ok) {
                const userData = await response.json();
                currentUser = userData; // On stocke les vraies données reçues de la DB
                
                // Mise à jour visuelle immédiate
                updateUI();
                alert(`Bienvenue ${userData.username} ! Ton compte a été créé en base de données.`);
                showPage('profile');
            }
        } catch (err) {
            alert("Erreur de connexion au serveur");
        }
    }

    function updateUI() {
        // Met à jour le nom dans le profil
        const profileName = document.querySelector('#page-profile h2');
        const profileBalance = document.querySelector('#page-profile .text-3xl');
        const navBalance = document.querySelector('nav .text-yellow-500');

        if(profileName) profileName.innerText = currentUser.username;
        if(profileBalance) profileBalance.innerText = currentUser.balance.toLocaleString() + " $";
        if(navBalance) navBalance.innerText = currentUser.balance.toLocaleString() + " $";
    }

    // Garde le reste de tes fonctions (showPage, loadStartups, etc.) ici...
    function showPage(pageId) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + pageId).classList.remove('hidden');
        if(pageId === 'entreprises') loadStartups();
        window.scrollTo(0,0);
    }
    
    // ... (inclure loadStartups, handleAddStartup, deleteStartup du code précédent)
</script>
